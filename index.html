<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alimentos Gallè - Contacto</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #E30613; /* Rojo del pedestal */
            --secondary-color: #FBB03B; /* Dorado del logo */
            --bg-color: #F7F7F7;
            --text-dark: #2B1D0E;
            --card-bg: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark);
        }

        .card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 40px 20px;
            text-align: center;
        }

        .profile-img-container {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid var(--card-bg);
            background-color: #fff;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: var(--text-dark);
            text-transform: uppercase;
        }

        .job-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--primary-color);
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 15px;
            background-color: var(--bg-color);
            color: var(--text-dark);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .link-btn:hover {
            background-color: var(--primary-color);
            color: #FFFFFF;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(227, 6, 19, 0.2);
        }

        .link-btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            margin-right: 12px;
        }

        /* Botón de llamada con color primario por defecto */
        .btn-call {
            background-color: var(--primary-color);
            color: #FFFFFF;
        }

        .btn-call:hover {
            background-color: #B5050F;
            box-shadow: 0 5px 15px rgba(181, 5, 15, 0.3);
        }

    </style>
</head>
<body>

    <div class="card">
        <div class="profile-img-container">
            <img src="./logo-galle.jpg" alt="Alimentos Gallè" class="profile-img">
        </div>

        <h1>Alimentos Gallè</h1>
        <p class="job-title">SABOR Y CALIDAD</p>
