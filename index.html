<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alimentos Gallè - Contacto</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Paleta de Colores Extraída de las Imágenes */
        :root {
            --color-rojo-pedestal: #E30613; /* Primario de la marca */
            --color-dorado-logo: #FBB03B;  /* Secundario para acentos */
            --color-texto-oscuro: #2B1D0E;  /* Texto principal */
            --color-fondo: #FFFFFF;        /* Fondo puro para el logo */
            --color-gris-fondo: #F5F5F5;   /* Fondo general sutil */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--color-gris-fondo);
            /* Integración sutil de la mascota en el fondo general como watermark */
            background-image: url('./mascota-galle.jpeg'); 
            background-repeat: no-repeat;
            background-position: center 80%;
            background-size: 50% auto; /* Mascota grande de fondo pero sutil */
            opacity: 0.98; /* Un toque menos de opacidad general para el watermark */
            color: var(--color-texto-oscuro);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        /* Aseguramos que la mascota de fondo no moleste la lectura */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(245, 245, 245, 0.6); /* Superposición gris clara para suavizar el fondo */
            z-index: -1;
        }

        .card {
            background-color: #FFFFFF;
            width: 100%;
            max-width: 400px; /* Ancho optimizado para móvil */
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08); /* Sombra suave de alta gama */
            padding: 50px 30px;
            text-align: center;
            position: relative; /* Para posicionamiento interno */
        }

        /* 1. Corrección del Logo: Círculo Blanco Perfecto sin Fondo Oscuro */
        .profile-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px auto;
            background-color: #FFFFFF; /* Fondo blanco puro para el logo */
            border-radius: 50%;
            padding: 8px; /* Espacio para el borde exterior */
            border: 5px solid;
            border-image: linear-gradient(135deg, var(--color-dorado-logo), var(--color-rojo-pedestal)) 1;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1); /* Sombra para dar profundidad */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Asegura el círculo perfecto */
        }

        .profile-logo {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain; /* Preserva la proporción del logo completo */
        }

        /* 2. Cabecera con la Mascota Interactiva */
        .header-content {
            margin-bottom: 35px;
            position: relative;
        }
        
        .header-mascot-icon {
            position: absolute;
            top: -20px;
            right: -10px;
            width: 40px;
            height: 40px;
            background-color: var(--color-rojo-pedestal);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .header-mascot-icon img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--color-texto-oscuro);
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1.1;
        }
        
        .brand-tagline {
            font-family: 'Roboto', sans-serif;
            font-weight: 400;
            font-size: 1rem;
            color: #666;
            margin-top: 5px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px 25px;
            background-color: var(--color-gris-fondo);
            color: var(--color-texto-oscuro);
            text-decoration: none;
            border-radius: 15px;
            font-weight: 500;
            font-size: 1.05rem;
            transition: all 0.3s ease; /* Transición suave */
            border: 2px solid transparent; /* Para efecto hover de borde */
        }

        .link-btn:hover, .link-btn:active {
            background-color: #FFFFFF;
            color: var(--color-rojo-pedestal);
            transform: translateY(-3px); /* Pequeño salto */
            box-shadow: 0 8px 15px rgba(227, 6, 19, 0.15);
            border-color: rgba(227, 6, 19, 0.2);
        }

        .link-btn svg {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            fill: currentColor; /* El ícono hereda el color del texto */
        }

        /* 3. Todos los Enlaces Específicos: Botones Especiales de Contacto */
        .btn-direct-contact {
            background-color: var(--color-rojo-pedestal);
            color: #FFFFFF;
            font-weight: 700;
            border-radius: 50px; /* Botones más redondeados para acción principal */
        }
        
        .btn-direct-contact:hover, .btn-direct-contact:active {
            background-color: #B2050F; /* Rojo más oscuro para el hover */
            color: #FFFFFF;
        }

        .btn-whatsapp {
            background-color: #25D366; /* Color oficial de WhatsApp */
            color: #FFFFFF;
            margin-top: 10px; /* Separación extra para la acción principal móvil */
        }
        
        .btn-whatsapp:hover, .btn-whatsapp:active {
            background-color: #1EBE57;
            color: #FFFFFF;
        }

    </style>
</head>
