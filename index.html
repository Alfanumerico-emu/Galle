<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alimentos Gallè - Contacto</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Paleta de Colores Extraída de las Imágenes */
        :root {
            --color-rojo-pedestal: #E30613; /* Primario de la marca (del pedestal) */
            --color-dorado-logo: #FBB03B;  /* Secundario para acentos (del logo) */
            --color-texto-oscuro: #2B1D0E;  /* Texto principal */
            --color-fondo-puro: #FFFFFF;    /* Fondo puro para el logo central */
            --color-gris-fondo: #F7F7F7;   /* Fondo general sutil */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--color-gris-fondo);
            opacity: 1.0; /* Maximiza la base para la marca de agua */
            color: var(--color-texto-oscuro);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative; /* Para el pseudo-elemento ::before */
        }
        
        /* 1. Corrección del Fondo: Mascota Watermark más visible */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Integración sutil de la mascota en el fondo como watermark */
            background-image: url('./mascota-galle.jpeg'); 
            background-repeat: no-repeat;
            background-position: center bottom; /* Centrada en la parte inferior */
            background-size: 60% auto; /* Ajuste para que se note */
            /* Aumento de la visibilidad reduciendo la opacidad de la superposición gris claro */
            background-color: rgba(247, 247, 247, 0.85); /* Opacidad alpha reducida de 0.9 a 0.85 para un ~5% más de visibilidad */
            z-index: -1;
        }

        .card {
            background-color: var(--color-fondo-puro);
            width: 100%;
            max-width: 400px; /* Ancho optimizado para móvil */
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08); /* Sombra suave de alta gama */
            padding: 50px 30px;
            text-align: center;
            position: relative; /* Para posicionamiento interno */
        }

        /* Contenedor del Logo Principal Corregido: Círculo Perfecto, Completo y sin Distorsión */
        .profile-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 25px auto;
            background-color: var(--color-fondo-puro); /* Fondo blanco puro para el logo */
            border-radius: 50%;
            padding: 8px; /* Espacio para el borde exterior */
            /* Borde degradado de alta gama */
            border: 5px solid;
            border-image: linear-gradient(135deg, var(--color-dorado-logo), var(--color-rojo-pedestal)) 1;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1); /* Sombra para dar profundidad */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Asegura el círculo perfecto */
        }

        .profile-logo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Preserva la proporción del logo completo sin apretarlo */
        }

        /* 2. Cabecera con la Mascota Interactiva Corregida */
        .header-content {
            margin-bottom: 35px;
            position: relative;
        }
        
        .header-mascot-icon {
            position: absolute;
            top: -20px;
            right: -10px;
            width: 50px; /* Tamaño ajustado para que se note más */
            height: 50px;
            background-color: var(--color-rojo-pedestal);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s ease; /* Pequeño efecto para el icono */
        }
        
        .header-mascot-icon:hover {
            transform: scale(1.1) rotate(5deg);
        }
        
        .header-mascot-icon img {
            width: 80%; /* Ajuste para el conejo completo */
            height: 80%;
            object-fit: contain;
        }

        .brand-name {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--color-texto-oscuro);
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1.1;
        }
        
        .brand-tagline {
            font-family: 'Roboto', sans-serif;
            font-weight: 400;
            font-size: 1rem;
            color: #666;
            margin-top: 5px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 18px 25px;
            background-color: var(--color-gris-fondo);
            color: var(--color-texto-oscuro);
            text-decoration: none;
            border-radius: 15px;
            font-weight: 500;
            font-size: 1.05rem;
            transition: all 0.3s ease; /* Transición suave de hover */
            border: 2px solid transparent; /* Para efecto hover de borde */
        }

        .link-btn:hover, .link-btn:active {
            background-color: var(--color-fondo-puro);
            color: var(--color-rojo-pedestal);
            transform: translateY(-3px); /* Pequeño salto al pasar el dedo */
            box-shadow: 0 8px 15px rgba(227, 6, 19, 0.15);
            border-color: rgba(227, 6, 19, 0.2);
        }

        .link-btn svg {
            width: 24px;
            height: 24px;
            margin-right: 15px;
            fill: currentColor; /* El ícono hereda el color del texto */
        }

        /* Estilo Destacado para el Botón de WhatsApp */
        .btn-whatsapp {
            background-color: #25D366; /* Color oficial de WhatsApp */
            color: #FFFFFF;
            font-weight: 700;
        }
        
        .btn-whatsapp:hover, .btn-whatsapp:active {
            background-color: #1EBE57; /* WhatsApp más oscuro para el hover */
            color: #FFFFFF;
        }

    </style>
</head>
<body>

    <main class="card">
        
        <div class="profile-container">
            <img src="./logo-galle.jpeg" alt="Alimentos Gallè"
